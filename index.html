<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Peptide Price Dashboard</title>
<style>
:root{--bg:#ffffff;--bg2:#f5f5f5;--bg3:#eee;--text:#1a1a2e;--text2:#666;--text3:#999;--border:#e0e0e0;--accent:#0984E3;--red:#e74c3c;--green:#27ae60;--radius:8px;--radius-lg:12px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a2e;--bg2:#252540;--bg3:#2e2e4a;--text:#e8e8f0;--text2:#a0a0b8;--text3:#707088;--border:#3a3a55}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg2);color:var(--text);padding:24px;min-height:100vh}
.wrap{max-width:760px;margin:0 auto}
h1{font-size:22px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px}
.card h2{font-size:18px;font-weight:500;margin-bottom:16px}
.field-row{display:flex;gap:12px;margin-bottom:12px;align-items:end}
.field{flex:1;display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--text2);font-weight:500}
.field select,.field input[type=number]{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:14px;appearance:auto}
.field input[type=number]{-moz-appearance:textfield;width:100%}
.field select:disabled,.field input:disabled{opacity:0.5}
.result-card{display:none;margin-top:16px;padding:16px;background:var(--bg2);border-radius:var(--radius)}
.result-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.stat{text-align:center}
.stat .label{font-size:11px;color:var(--text2);margin-bottom:2px}
.stat .val{font-size:18px;font-weight:500;color:var(--text)}
.stat .val.hl{color:var(--accent)}
.savings-bar{margin-top:12px}
.savings-bar .bar-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.bar-wrap{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width 0.4s}
.sav-text{font-size:12px;color:var(--text2);margin-top:4px}
.add-btn{padding:8px 20px;border:1px solid var(--accent);border-radius:var(--radius);background:var(--accent);color:#fff;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity 0.15s}
.add-btn:hover{opacity:0.85}
.add-btn:disabled{opacity:0.4;cursor:default}
.order-empty{font-size:13px;color:var(--text3);text-align:center;padding:24px 0}
.order-item{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.order-item:last-of-type{border-bottom:none}
.oi-name{font-size:14px}
.oi-name span{font-size:12px;color:var(--text2)}
.oi-qty{display:flex;align-items:center;gap:6px}
.oi-qty button{width:28px;height:28px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.1s}
.oi-qty button:hover{background:var(--bg2)}
.oi-qty .qty-val{font-size:14px;font-weight:500;min-width:24px;text-align:center}
.oi-price{font-size:14px;font-weight:500;min-width:70px;text-align:right}
.oi-remove{cursor:pointer;color:var(--text3);font-size:18px;padding:0 4px;transition:color 0.1s}
.oi-remove:hover{color:var(--red)}
.order-total{display:flex;justify-content:space-between;align-items:center;padding:14px 0 4px;border-top:2px solid var(--text);margin-top:8px}
.order-total .ot-label{font-size:16px;font-weight:500}
.order-total .ot-val{font-size:22px;font-weight:500;color:var(--accent)}
.order-count{font-size:12px;color:var(--text2);margin-top:4px}
.clear-btn{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;padding:4px 0;margin-top:8px}
.clear-btn:hover{text-decoration:underline}
.btn-row{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
.copy-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;transition:background 0.15s}
.copy-btn:hover{background:var(--bg2)}
.copied-msg{font-size:12px;color:var(--green);opacity:0;transition:opacity 0.3s}
.copied-msg.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
<h1>2026 Peptide Price Dashboard</h1>
<p class="sub">peptide-Anne-Dora &middot; All prices USD &middot; 10 vials per kit</p>

<div class="card">
  <h2>Add to order</h2>
  <div class="field-row">
    <div class="field" style="flex:1.3"><label>Peptide</label><select id="pepSel"><option value="">Select a peptide...</option></select></div>
    <div class="field"><label>Size (per vial)</label><select id="sizeSel" disabled><option value="">Select size...</option></select></div>
    <div class="field" style="flex:0.5"><label>Qty (kits)</label><input type="number" id="qtyInput" min="1" value="1" disabled></div>
    <div style="display:flex;align-items:end;padding-bottom:1px"><button class="add-btn" id="addBtn" disabled>Add</button></div>
  </div>
  <div class="result-card" id="resCard">
    <div class="result-grid">
      <div class="stat"><div class="label">Kit price</div><div class="val" id="rP">—</div></div>
      <div class="stat"><div class="label">Per vial</div><div class="val" id="rPV">—</div></div>
      <div class="stat"><div class="label">10+ kits</div><div class="val" id="rP10">—</div></div>
      <div class="stat"><div class="label">Total qty</div><div class="val" id="rT">—</div></div>
      <div class="stat"><div class="label">Cost / unit</div><div class="val hl" id="rC">—</div></div>
    </div>
    <div class="savings-bar" id="savW" style="display:none">
      <div class="bar-label">Volume savings vs smallest size</div>
      <div class="bar-wrap"><div class="bar-fill" id="savB" style="width:0%"></div></div>
      <div class="sav-text" id="savT"></div>
    </div>
  </div>
</div>

<div class="card">
  <h2>Order summary</h2>
  <div id="orderList"><div class="order-empty">No items yet — add products above</div></div>
  <div id="orderFooter" style="display:none">
    <div class="order-total"><span class="ot-label">Total</span><span class="ot-val" id="orderTotal">$0</span></div>
    <div class="order-count" id="orderCount"></div>
    <button class="clear-btn" id="clearBtn">Clear order</button>
    <div class="btn-row">
      <button class="copy-btn" id="copyBtn" onclick="copyOrder()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Copy order
      </button>
      <span class="copied-msg" id="copiedMsg">Copied!</span>
    </div>
  </div>
</div>
</div>

  sizeSel.innerHTML='<option value="">Select size...</option>';
  resCard.style.display='none';
  qtyInput.disabled=true;addBtn.disabled=true;
  const n=pepSel.value;
  if(!n){sizeSel.disabled=true;return}
  sizeSel.disabled=false;
  byName[n].forEach(d=>{
    const o=document.createElement('option');o.value=d.a;
    o.textContent=d.pv+' '+d.u+' per vial ('+d.a+')';
    sizeSel.appendChild(o);
  });
});

sizeSel.addEventListener('change',()=>{
  const code=sizeSel.value;
  if(!code){resCard.style.display='none';qtyInput.disabled=true;addBtn.disabled=true;return}
  const d=DATA.find(x=>x.a===code);
  resCard.style.display='block';
  qtyInput.disabled=false;addBtn.disabled=false;qtyInput.value=1;
  document.getElementById('rP').textContent='$'+d.p.toFixed(0);
  document.getElementById('rPV').textContent='$'+d.ppv.toFixed(2);
  document.getElementById('rP10').textContent='$'+d.p10.toFixed(0);
  document.getElementById('rT').textContent=(d.t>=1?Math.round(d.t):d.t)+' '+d.u;
  document.getElementById('rC').textContent='$'+d.cpu.toFixed(4)+'/'+d.u;
  const siblings=byName[d.n];
  const savW=document.getElementById('savW');
  if(siblings.length>1){
    const maxCPU=Math.max(...siblings.map(s=>s.cpu));
    if(maxCPU!==Math.min(...siblings.map(s=>s.cpu))){
      savW.style.display='block';
      const pct=((maxCPU-d.cpu)/maxCPU*100);
      document.getElementById('savB').style.width=pct.toFixed(0)+'%';
      document.getElementById('savT').textContent=pct>0?'Saving '+pct.toFixed(0)+'% vs smallest size ($'+maxCPU.toFixed(2)+'/'+d.u+')':'This is the smallest (most expensive per '+d.u+') option';
    } else savW.style.display='none';
  } else savW.style.display='none';
});

let order=[];

function getPrice(item){
  const d=DATA.find(x=>x.a===item.code);
  return item.qty>=10?d.p10:d.p;
}

function renderOrder(){
  if(!order.length){
    orderList.innerHTML='<div class="order-empty">No items yet — add products above</div>';
    orderFooter.style.display='none';
    return;
  }
  let html='';
  let total=0;
  let totalKits=0;
  order.forEach((item,i)=>{
    const d=DATA.find(x=>x.a===item.code);
    const unitPrice=getPrice(item);
    const lineTotal=unitPrice*item.qty;
    total+=lineTotal;
    totalKits+=item.qty;
    const priceNote=item.qty>=10?' <span style="color:var(--green);font-size:11px">10+ rate</span>':'';
    html+='<div class="order-item">'
      +'<div class="oi-name">'+d.n+' <span style="color:var(--text3)">('+d.a+')</span><br><span>'+d.pv+d.u+'/vial &middot; $'+unitPrice.toFixed(0)+'/kit'+priceNote+'</span></div>'
      +'<div class="oi-qty">'
        +'<button onclick="changeQty('+i+',-1)">−</button>'
        +'<span class="qty-val">'+item.qty+'</span>'
        +'<button onclick="changeQty('+i+',1)">+</button>'
      +'</div>'
      +'<div class="oi-price">$'+lineTotal.toLocaleString()+'</div>'
      +'<div class="oi-remove" onclick="removeItem('+i+')">&times;</div>'
      +'</div>';
  });
  orderList.innerHTML=html;
  orderFooter.style.display='block';
  document.getElementById('orderTotal').textContent='$'+total.toLocaleString();
  document.getElementById('orderCount').textContent=order.length+' product'+(order.length>1?'s':'')+', '+totalKits+' total kit'+(totalKits>1?'s':'');
}

addBtn.addEventListener('click',()=>{
  const code=sizeSel.value;
  const qty=Math.max(1,parseInt(qtyInput.value)||1);
  if(!code)return;
  const existing=order.find(x=>x.code===code);
  if(existing){existing.qty+=qty}
  else{order.push({code,qty})}
  renderOrder();
});

function changeQty(i,delta){
  order[i].qty+=delta;
  if(order[i].qty<1)order.splice(i,1);
  renderOrder();
}

function removeItem(i){
  order.splice(i,1);
  renderOrder();
}

document.getElementById('clearBtn').addEventListener('click',()=>{order=[];renderOrder()});

function buildOrderText(){
  let lines=[];
  let total=0;
  order.forEach(item=>{
    const d=DATA.find(x=>x.a===item.code);
    const unitPrice=getPrice(item);
    const lineTotal=unitPrice*item.qty;
    total+=lineTotal;
    lines.push(item.qty+'x '+d.a+' - '+d.n+' - $'+lineTotal);
  });
  lines.push('');
  lines.push('Total: $'+total);
  return lines.join('\n');
}

function copyOrder(){
  if(!order.length)return;
  var text=buildOrderText();
  var ta=document.createElement('textarea');
  ta.value=text;
  ta.style.position='fixed';
  ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  var msg=document.getElementById('copiedMsg');
  msg.classList.add('show');
  setTimeout(function(){msg.classList.remove('show')},2000);
}

renderOrder();
</script>
</body>
</html>
